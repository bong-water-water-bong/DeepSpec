## Per-PR Review Checklist

### CRITICAL — ML CORRECTNESS

- [ ] Loss computation: DSpark uses compute_dspark_loss (CE + optional L1 + optional confidence BCE), Eagle3 uses compute_eagle3_loss (Triton-fused soft CE with TTT loop). Check the right loss is called.
- [ ] Loss scaling: DSpark backward uses global_denominators (all-reduced across GPUs) x world_size. Eagle3 uses FusedLogSoftmaxLoss with local_mean normalizer. Verify the right denominator.
- [ ] Config compatibility: new config fields must not break backward-compatible checkpoint loading (full state_dict reload)
- [ ] mask_token_id matches target model tokenizer (151669 for Qwen3, verify for Gemma4)
- [ ] block_size, num_draft_layers, target_layer_ids consistent across config.py, build_draft_config(), and model forward
- [ ] Markov head type ('vanilla', 'gated', 'rnn') correctly instantiated in build_markov_head()
- [ ] Eagle3: draft_num_hidden_layers must be exactly 1 (asserted in evaluator)
- [ ] Eagle3: validate_eagle3_target_layer_ids expects exactly 5 strictly increasing IDs
- [ ] DSpark: target_layer_ids must be strictly increasing, optionally includes -1 (embedding layer)
- [ ] loss_decay_gamma correctly applied (exponential decay across block positions), 0 or None = uniform
- [ ] confidence_head_alpha > 0 requires confidence_head_with_markov in config
- [ ] accept_rate_3d = 1 - 0.5 * |softmax(draft) - softmax(target)|_L1, clamped [0, 1] for confidence head targets
- [ ] Gradient flow: no unintended torch.no_grad() around model forward when grads needed
- [ ] FusedLogSoftmaxLoss backward writes in-place into logits — callers must not read logits after loss backward

### CRITICAL — DISTRIBUTED TRAINING

- [ ] train.py uses torch.multiprocessing.spawn, NOT torchrun. RANK env = node_rank, WORLD_SIZE = node_count
- [ ] init_dist: rank = node_rank * local_world_size + local_rank; world_size = node_world_size * local_world_size
- [ ] No hardcoded world_size or rank values (no assert world_size == 8 etc.)
- [ ] Gradient accumulation: global_batch_size divisible by world_size * local_batch_size
- [ ] FSDP sharding strategy string matches _SHARDING_STRATEGIES keys exactly (full_shard, shard_grad_op, no_shard, hybrid_shard, hybrid_shard_zero2, _hybrid_shard_zero2)
- [ ] Hybrid sharding: init_device_mesh with correct mesh shape (nodes, gpus_per_node)
- [ ] FSDP MixedPrecision param_dtype matches precision setting (bf16/fp16)
- [ ] Seed reproducibility: seed_all() called before any model construction, same data order with same seed
- [ ] torch.compile with dynamic=True doesn't break FSDP / distributed
- [ ] hfai suspend: SuspendController thread properly cleaned up on exit

### MEMORY & PERFORMANCE

- [ ] BF16Optimizer: master fp32 weights + copy-back pattern — doubles param memory
- [ ] CUDAPrefetcher: no CPU-side bottlenecks in hot loop (no excessive .item() calls in training loop)
- [ ] .item() calls: CHECK for .item() inside the training loop body (not just on_optimizer_step which is only per sync step)
- [ ] Target cache I/O: CacheDataset uses mmap, CUDAPrefetcher overlaps H2D with compute
- [ ] FusedLogSoftmaxLoss: Triton kernel saves only m, d scalars (not [B,T,V] fp32 log-probs) — ensure this pattern isn't broken
- [ ] No redundant tensor copies or .clone()/.detach() in hot inner loops
- [ ] Eagle3 TTT loop: each step adds KV to DynamicCache — memory grows linearly with ttt_length * seq_len
- [ ] DSpark: create_dspark_attention_mask is flex_attention — verify mask doesn't accidentally attend to wrong blocks
- [ ] CUDA streams: CUDAPrefetcher uses a dedicated stream; verify sync points are correct

### DATA PIPELINE

- [ ] Chat template: "qwen" or "gemma" supported — other values will fail at TemplateRegistry.get()
- [ ] Tokenizer special tokens match chat template (im_start/im_end for Qwen3, turn/channel for Gemma4)
- [ ] Target cache: CacheDataset reads TARGET_CACHE_VERSION == 2, validates shard format on load
- [ ] validate_train_cache() called in BaseTrainer.__init__ — ensures cache format matches model config
- [ ] Variable-length sequences: CacheCollator pads to max_seq_len in batch
- [ ] DataLoader params: num_workers, pin_memory=True, prefetch_factor=4, persistent_workers=True
- [ ] Loss mask: sequences where loss_mask is all zeros should be handled (no NaN loss)

### EVAL CORRECTNESS

- [ ] EVALUATORS dict maps architectures[0] to evaluator class — new model types must be added here
- [ ] BaseEvaluator.evaluate(): generates speculative decoding samples, runs verification
- [ ] 9 benchmarks: gsm8k, math500, aime25, humaneval, mbpp, livecodebench, mt-bench, alpaca, arena-hard-v2
- [ ] TASKS tuple: (name, max_new_tokens) — verify max_new_tokens not accidentally changed
- [ ] DSpark: max_proposal_tokens = draft_model.block_size; Eagle3: max_proposal_tokens = draft_model.ttt_length
- [ ] Confidence head: confidence_threshold != 0 disables confidence recording (artifact_root = None)
- [ ] assert_no_final_target_layer: target_last_layer should not be used since it's the final layer's output

### SGLANG / DATA PREP

- [ ] Server port range: 30000-30007 for 8 workers, NCCL 31000-31007
- [ ] generate_train_data.py: ThreadPoolExecutor concurrency — too high can overload SGLang servers
- [ ] --resume flag: counts existing output lines, skips them
- [ ] prepare_target_cache.py: ~38 TB for full Qwen3-4B dataset — verify num_target_layers or dataset size
- [ ] SGLang NOT in requirements.txt — must be installed separately

### CHECKPOINT / RESUME

- [ ] Checkpoints save to step_<N>/ directories with step_latest symlink
- [ ] load_training_state restores next_micro_step, optimizer, scheduler correctly
- [ ] Resume: start_offset_samples = next_micro_step * local_batch_size; num_samples = remaining_micro_steps * local_batch_size
- [ ] FSDP full state dict saving/loading: FullStateDictConfig(offload_to_cpu=True, rank0_only=True)

## Review Tone
Be rigorous but constructive. Flag loss computation errors, distributed setup bugs, or data pipeline issues as CRITICAL — these are the most common failure modes in ML research codebases. Config-parameter mismatches between model, trainer, and data are a common footgun. Minor style notes (import ordering, type hints) can be mentioned but not blocked on.

Any PR that touches loss.py, distributed.py, config.py, or base_trainer.py deserves extra scrutiny. Changes to ckpt_manager.py that affect the state_dict structure are checkpoint-breaking and deserve extra attention.
"""

