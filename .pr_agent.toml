## Entry Points

### train.py (torch multiprocessing spawn — NOT torchrun)
```python
if __name__ == "__main__":
    torch.multiprocessing.spawn(main, nprocs=torch.cuda.device_count())
```
- main(local_rank) parses args, seeds, creates trainer, calls trainer.train(), clean_up()
- args = parse_args(): --config (required, path to .py config file) + --opts (repeatable: "key.path=value")
- Prints git sha + git diff before spawning
- RANK env = node_rank, WORLD_SIZE env = node_count (NOT GPU count)

### eval.py
```python
if __name__ == "__main__":
    args = parse_args()  # --target_name_or_path, --draft_name_or_path, --max-new-tokens, --temperature, --confidence-threshold
```
- Loads draft config from --draft_name_or_path, maps architectures[] to evaluator class
- EVALUATORS dict: Qwen3DSparkModel, Gemma4DSparkModel, Qwen3Eagle3Model, Gemma4Eagle3Model, Eagle3DraftModel
- Runs 9 benchmarks: gsm8k(500), math500(500), aime25(30), humaneval(164), mbpp(256), livecodebench(500), mt-bench(80), alpaca(500), arena-hard-v2(500)

## Central Config System (deepseek/utils/config.py)

- ConfigNode: dict subclass with __getattr__/__setattr__ delegation (access via cfg.foo.bar)
- load_config(path): importlib loads a .py file, returns ConfigNode of non-dunder module globals
- parse_opts_to_config(opts, cfg): --opts "train.lr=3e-4" parses with yaml.safe_load, traverses dotted path, updates leaf
- finalize_config(cfg): optionally calls a finalize_cfg() function from the config module
- CustomJSONEncoder handles ConfigNode, FunctionType, torch.dtype, Path, Namespace

Config files live in config/ subdirectories:
  config/dspark/dspark_qwen3_4b.py, dspark_qwen3_8b.py, dspark_qwen3_14b.py, dspark_gemma4_12b.py
  config/dflash/dflash_*.py (same matrix)
  config/eagle3/eagle3_*.py (same matrix)

Every config has 4 dict sections: model, train, logging, data

### model dict fields:
- target_model_name_or_path: str
- block_size: int (draft pred length, e.g. 7)
- num_draft_layers: int (e.g. 5 for DSpark, 1 for Eagle3)
- target_layer_ids: list[int] — DSpark: [1,9,17,25,33] for 4B; Eagle3: exactly 5 IDs
- mask_token_id: int (151669 for Qwen3, depends on target tokenizer)
- num_anchors: int (DSpark: default 512)
- markov_rank: int (DSpark: default 256, 0 = no markov head)
- markov_head_type: str ("vanilla", "gated", or "rnn")
- confidence_head_alpha: float (0.0 = disabled)
- confidence_head_with_markov: bool
- loss_decay_gamma: float (default 4.0, exponential decay across block positions)
- ce_loss_alpha: float (default 0.1)
- l1_loss_alpha: float (default 0.9)
- tie_word_embeddings: bool (forced False in build_draft_config)

### train dict fields:
- trainer_cls: class (not str — eval() resolved in config via import)
- lr: float
- warmup_ratio: float (e.g. 0.04)
- weight_decay: float (default 0.0)
- precision: str ("bf16" or "fp16")
- local_batch_size: int (per GPU)
- global_batch_size: int (= local_batch_size * grad_acc_steps * num_gpus)
- num_train_epochs: int (e.g. 10)
- max_train_steps: int | None
- sharding_strategy: str (full_shard, shard_grad_op, no_shard, hybrid_shard, hybrid_shard_zero2)
- torch_compile: bool
- max_grad_norm: float (e.g. 1.0)

### logging dict:
- checkpoint_dir: str (default ~/checkpoints/<project>/<exp>)
- tensorboard_dir: str
- checkpointing_steps: int
- logging_steps: int

### data dict:
- target_cache_path: str
- chat_template: str ("qwen" or "gemma")
- max_length: int
- num_workers: int

## Trainer Hierarchy & Training Loop

BaseTrainer (deepspec/trainer/base_trainer.py):
  - __init__: init_dist, precision dtype, FSDP wrap, CacheDataset load, schedule computation, BF16Optimizer, resume
  - build_models: loads target model from HF, initializes draft model embeddings/head from target (frozen), deletes target
  - train(): CUDAPrefetcher loop with gradient accumulation + FSDP.no_sync() context
    - Loss = run_batch(batch) / grad_acc_steps, then backward()
    - On sync step: FSDP.clip_grad_norm_, optimizer.step(), training_logger.on_optimizer_step()
    - Checkpoint at interval + on suspend
  - run_batch(batch): abstract — delegates to subclass (DSpark: compute_dspark_loss, Eagle3: compute_eagle3_loss)
  - FSDP wrapping: supports full_shard, shard_grad_op, no_shard, hybrid_shard, hybrid_shard_zero2
  - Hybrid sharding uses init_device_mesh with (replicate, shard) dims
  - SuspendController: optional hfai cluster suspend/resume, polls in bg thread

Qwen3DSparkTrainer (deepspec/trainer/dspark_trainer.py):
  - data_collator_cls = CacheCollator
  - run_batch(batch): calls self.model(...) then compute_dspark_loss(...)
  - model input signature: input_ids, target_hidden_states, loss_mask, target_last_hidden_states
  - _build_draft_model: calls build_qwen3_draft_config + Qwen3DSparkModel

Gemma4DSparkTrainer(Qwen3DSparkTrainer):
  - overrides _build_draft_model only (uses Gemma4DSparkModel + build_gemma4_draft_config)

Qwen3Eagle3Trainer(BaseTrainer):
  - data_collator_cls = CacheCollator
  - build_models: loads target model, creates Eagle3 model
  - run_batch: uses compute_eagle3_loss (Triton-fused soft CE, not standard CE)

Gemma4Eagle3Trainer(Qwen3Eagle3Trainer):
  - overrides _build_draft_model only

### DSpark Loss (deepspec/modeling/dspark/loss.py)
compute_dspark_loss(outputs, loss_decay_gamma, ce_loss_alpha, l1_loss_alpha, confidence_head_alpha):
  1. Builds loss_weight_mask with exponential decay: exp(-pos / loss_decay_gamma)
  2. CE loss: F.cross_entropy over flattened [B*num_anchors*block_size, V] with weights
  3. L1 loss (if alpha > 0): |softmax(draft) - softmax(target)| per token, weighted
  4. Confidence loss (if alpha > 0): BCE with logits on accept_rate_3d (1 - 0.5*|draft - target|_L1)
  5. All-reduce denominators across GPUs for correct normalization
  6. Final = (ce_alpha * ce_loss + l1_alpha * l1_loss + conf_alpha * conf_loss) * world_size
  Backward uses global denominators (summed across GPUs), local loss uses local denominators

### Eagle3 Loss (deepspec/modeling/eagle3/loss.py)
compute_eagle3_loss(model, batch, ttt_length, step_loss_decay):
  1. TTT (Test-Time Training) — loops ttt_length steps, each step does draft forward + loss
  2. Uses FusedLogSoftmaxLoss (Triton kernel) — NOT standard CE
  3. FusedLogSoftmaxLoss: soft cross-entropy with fused forward/backward Triton kernel
     - Forward: log-sum-exp trick (keeps only m, d scalars per row, never materializes full log-softmax)
     - Backward: writes gradient in-place into logits (Liger/Unsloth memory-saving pattern)
     - Masked positions (position_mask == 0) contribute zero to numerator AND zero gradient
  4. loss_normalizers = "local_mean" only (valid_token_mean explicitly disabled)
  5. Step weights: step_weight = step_loss_decay ** step_idx (geometric decay)
  6. Metrics per step: accuracy@k, accept_rate@k, valid_tokens@k, ploss_k
  7. Prefix metrics: tau_greedy, tau_probabilistic

## DSpark Modeling (deepspec/modeling/dspark/)

### common.py — shared DSpark utilities
- DSparkForwardOutput dataclass: draft_logits[B, num_anchors, block_size, V], target_ids, eval_mask, block_keep_mask, confidence_pred, aligned_target_logits
- AcceptRatePredictor: Linear(input_dim, 1) for confidence head
- extract_context_feature(hidden_states, layer_ids): concat selected layer outputs
- sample_anchor_positions: random subset of valid positions (those with loss_mask > 0.5 and next token also valid)
- build_eval_mask: cumulative product of valid positions (enforces contiguous prefix)
- create_dspark_attention_mask: flex_attention mask — context region (kv < anchor_pos) attends all, draft region attends same block only
- create_position_ids: anchor_positions + offset
- create_noise_embed: fill draft positions with mask_token_id except first position gets actual anchor token

### markov_head.py — 3 head types
- VanillaMarkov: Embedding(vocab, markov_rank) -> Linear(markov_rank, vocab) bias added to logits
- GatedMarkovHead: adds sigmoid gate conditioned on hidden_states * prev_embeddings
- RNNHead: GRU-like state machine — state_k = gate * state_{k-1} + (1-gate) * candidate, bias = W2(tanh(output))
- build_markov_head(config): returns None if markov_rank == 0
- Autoregressive sampling: sample_block_tokens iterates over positions, applies bias, samples, feeds next

### qwen3/ — model files
- Qwen3DSparkModel: custom architecture with:
  - Qwen3DSparkAttention: replaces standard Qwen3 attention with flex_attention support
  - forward(): takes input_ids, target_hidden_states, loss_mask, target_last_hidden_states
  - Block draft structure: samples anchors, creates attention mask, runs backbone layers, applies markov_bias per position, optionally runs confidence head
- Qwen3DSparkConfig: inherits Qwen3Config, adds DSpark-specific fields
- build_draft_config(target_config, model_args): copies target config, sets architectures=["Qwen3DSparkModel"], adds draft params

### gemma4/ — Gemma4 variant
- Same structure, different target model backbone (Gemma4Config)

## DFlash (config/dflash/)
- Similar structure to DSpark, same config file layout
- Different algorithm details (see config/dflash/ files for specifics)

## Eagle3 Modeling (deepspec/modeling/eagle3/)

### common.py
- Eagle3ForwardOutput: hidden_states, draft_logits, target_logits (optional)
- validate_eagle3_target_layer_ids: exactly 5 strictly increasing layer IDs
- extract_eagle3_context_feature: consumes target decoder layers only (no embedding -1)
- flex_attention mask: query i attends all context + same-block-only draft

### qwen3/ and gemma4/
- Eagle3 models have draft_num_hidden_layers == 1 (single layer draft head)
- Uses DynamicCache for recurrent state across TTT steps
- ROPE cache with step offset (rope_cache_step_offset=True)

## Data Pipeline (deepspec/data/)

### parser.py
- ChatTemplate dataclass: assistant_header, user_header, system_prompt, end_of_turn_token, assistant_loss_prefix
- TemplateRegistry: name -> ChatTemplate mapping
- Supported: "qwen" (im_start/im_end) and "gemma4" (turn/channel)
- GeneralParser: tokenizer + template -> encode_chat_messages (max_length truncation)

### target_cache_dataset.py
- Target cache format v2: mmap'd binary, index struct (QIIQQQQQ per sample), shard files
- INDEX_RECORD_STRUCT = struct.Struct("<QIIQQQQQ"): sample_offset, sample_nbytes, sample_version, input_ids_offset, loss_mask_offset, target_hidden_states_offset, target_last_hidden_states_offset
- CacheDataset: reads from shard files, __getitem__ returns dict of tensors
  - Keys: input_ids[seq_len], attention_mask[seq_len], loss_mask[seq_len], target_hidden_states[seq_len, num_target_layers, hidden_size], target_last_hidden_states[seq_len, hidden_size]
  - CacheCollator: collate_fn that pads to max_seq_len, returns batch dict (CUDA prefetcher moves to GPU)
  - ConversationCollator: also handles chat template encoding for ConversationDataset
- ~38 TB for Qwen3-4B full dataset

### cuda_prefetcher.py
- CUDAPrefetcher: background thread + CUDA stream overlaps DataLoader iteration + H2D with compute
- move_batch_to_device: moves tensors with non_blocking=True, casts input_ids to long
- __next__: returns pre-fetched GPU batch, kicks off next fetch

### jsonl_dataset.py
- JsonLineDataset: mmap'd JSONL with pre-built line offset index (~/.cache/deepspec)
- __getitem__: mmap read by offset, json.loads

## Distributed Training (deepspec/utils/distributed.py)

```python
def init_dist(local_rank, timeout_minutes=60):
    local_world_size = torch.cuda.device_count()  # GPUs on this node
    node_rank = int(os.environ["RANK"])           # node rank (0, 1, N-1)
    node_world_size = int(os.environ["WORLD_SIZE"])  # total nodes
    rank = node_rank * local_world_size + local_rank
    world_size = node_world_size * local_world_size
    # tcp init: MASTER_ADDR:MASTER_PORT
```

Key: RANK = node rank, WORLD_SIZE = node count. Not torchrun semantics.
train.py spawns one worker per visible GPU (torch.cuda.device_count()).
eval.py uses same pattern.

### BF16Optimizer (deepspec/utils/optim.py)
- Master weights in fp32, model weights in bf16
- AdamW on fp32 params, copy grad bf16->fp32, step, copy back bf16->model
- CosineAnnealingWarmupLR: linear warmup -> cosine decay
- scheduler.step() called inside optimizer.step()

### metrics.py
- All-reduce based distributed metrics: dp_mean, dp_sum, dp_max, dp_min, dp_last
- add_metric(name, value, den, reduction, tag): stores (num, den) or scalar
- flush(): all-reduce, return {name: scalar} dict
- reset(): clear accumulated metrics

## FSDP Configuration

Sharding strategies (from _SHARDING_STRATEGIES dict):
  full_shard, shard_grad_op, no_shard, hybrid_shard, hybrid_shard_zero2, _hybrid_shard_zero2

Hybrid: init_device_mesh("cuda", (nodes, gpus_per_node), dim_names=("replicate", "shard"))
MixedPrecision: param_dtype=buffer_dtype=precision_dtype (bf16)
use_orig_params=True

## Checkpoint Manager (deepspec/trainer/ckpt_manager.py)

- save_checkpoint: FSDP full state dict + optimizer state + scheduler state + fp32 master weights + train_config.py
  Writes to step_<N>/ directory, symlinks step_latest -> most recent
- load_resume_draft_model: FSDP load_state_dict with FullStateDictConfig
- load_training_state: restores next_micro_step, optimizer, scheduler
- discover_latest_checkpoint: resolves step_latest symlink

## SGLang Data Pipeline (scripts/data/)

### launch_sglang_server.sh
- 8 workers on ports 30000-30007, NCCL ports 31000-31007
- Heartbeat loop every 300s
- mem_fraction=0.9, dtype=bfloat16
- Trap cleanup on INT/TERM/EXIT

### generate_train_data.py
- ThreadPoolExecutor concurrency (default 64)
- OpenAI client to SGLang /v1 servers
- Supports --enable-thinking / --disable-thinking (mutually exclusive)
- Sampling: temperature (0-1), top_p, top_k, min_p, repetition_penalty
- --resume: skips existing output lines
- --is-reasoning-model / --is-gpt-oss flags

### prepare_target_cache.py
- Takes config, data path, output dir, local batch size
- Loads target model with AutoModel, runs forward pass on all samples
- Saves to mmap'd shards with atomic_json_dump for index

